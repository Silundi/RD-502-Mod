//	==================================================
//	RD-502
//
//	Manufacturer: Glushko Design Bureau
//
//	=================================================================================
//	RD-502
//	Proton / N-1 (1963)
//
//	Dry Mass: 132 Kg
//	Thrust (SL): ??? kN
//	Thrust (Vac): 98.1 kN
//	ISP: 163 SL / 380 Vac     Sea level ISP is a complete guess, likely horrible because of the nozzle.
//	Burn Time: 800
//	Chamber Pressure: 147.0 Bar
//	Propellant: Pentaborane / HTP
//	Prop Ratio: 1.10
//	Throttle: 98.1 kN minimum?
//	Nozzle Ratio: 143.3
//	Ignitions: 8 // Guessing here, fuels are hypergolic and limited by helium reserves to start up engine.
//	=================================================================================
//	Sources:

//		http://www.astronautix.com/r/rd-502.html // Almost nothing about this engine exists.
//      
//      https://epizodsspace.airbase.ru/bibl/inostr-yazyki/iaa/2007/Lardier_Liquid.pdf // Given time period on pg14.
//
//      
//
//

//	Used by: Silundi
//		
//	Notes:

//	==================================================
@PART[*]:HAS[#engineType[RD502]]:FOR[RealismOverhaulEngines]
{
	%title = RD-502	//RD-502
	%manufacturer = Glushko Design Bureau
	%description = A 1960's Pentaborane/HTP vaccum optimized engine intended for a Proton upper stage, although never built due to logistics and toxicity complications.

	@tags ^= :$: USSR rd-501 Glushko Pentaborane rd-502 htp liquid

	%specLevel = prototype

	@MODULE[ModuleEngines*]
	{
		%EngineType = LiquidFuel
	}

	!MODULE[ModuleEngineConfigs],*{}
	!MODULE[ModuleAlternator],*{}
	!RESOURCE,*{}

	@MODULE[ModuleGimbal]
	{
		%gimbalRange = 0
		%useGimbalResponseSpeed = true
		%gimbalResponseSpeed = 16
	}

	MODULE
	{
		name = ModuleEngineConfigs
		configuration = RD-502
		modded = false
		origMass = 0.132
		CONFIG
		{
			name = RD-502
			description = Exotic B5H9 and H2O2 engine, vaccum optimized.
			specLevel = prototype
			minThrust = 98.1		//Likely no throttle capabilities.
			maxThrust = 98.1
			heatProduction = 100
			gimbalRange = 5
			PROPELLANT
			{
				name = Pentaborane
				ratio = 0.394 // Running H2O2 rich as a guess.
				DrawGauge = True
			}
			PROPELLANT
			{
				name = HTP
				ratio = 0.606
			}
			atmosphereCurve
			{
				key = 0 380
				key = 1 163.0 //Complete guess as stated in a previous note.
			}
			
			ullage = false
			pressureFed = False // images look like they lack turbopumps, but I cannot prove it so it will remain unchanged.
			ignitions = 0
			IGNITOR_RESOURCE
			{
				name = ElectricCharge
				amount = 0.5
			}

			TESTFLIGHT:NEEDS[TestLite|TestFlight]
			{
				//Never flew, assuming performance slightly lower than hydrolox values.
				testedBurnTime = 5000		//This is just being left as is, not changing anything with existing RD-57 testflight configs.
				ratedBurnTime = 800
				safeOverburn = true

				// assume roughly exponential relationship between chamber pressure and lifespan
				thrustModifier
				{
					key = 0.00 0.05 0 0
					key = 1.00 1.00 3 3
				}
				ignitionReliabilityStart = 0.906250
				ignitionReliabilityEnd = 0.981250
				cycleReliabilityStart = 0.800000
				cycleReliabilityEnd = 0.970000
				ignitionDynPresFailMultiplier = 0.1
			}
		}
	}
}